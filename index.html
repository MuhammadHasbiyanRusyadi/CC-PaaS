<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo PaaS - Muhammad Hasbiyan Rusyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; font-weight: 600; }
        p { opacity: 0.9; line-height: 1.6; font-weight: 300; }
        .status-badge {
            background: rgba(255, 255, 255, 0.1);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status-badge">PaaS Via Vercel Test</div>
    <h1>Ini Merupakan Test PaaS Github dan Vercel</h1>
    <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
    <p>Aplikasi ini adalah test pembuktian Otomatisasi Cloud Computing menggunakan GitHub dan Vercel.</p>
    <p style="font-size: 2.0rem; color: #94a3b8;">"Ini merupakan testing PaaS"</p>
</div>

</body>
</html>
