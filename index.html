<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo PaaS - Muhammad Hasbiyan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; }
        p { opacity: 0.9; line-height: 1.6; }
        .status-badge {
            background: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status-badge">PaaS Via Vercel Test</div>
    <h1>Ini Merupakan Test PaaS Github dan Vercel</h1>
    <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 20px 0;">
    <p>Aplikasi ini adalah test pembuktian Otomatisasi Cloud Computing menggunakan GitHub dan Vercel.</p>
    <p style="font-size: 0.9rem; font-style: italic;">"Testing?"</p>
</div>

</body>
</html>
